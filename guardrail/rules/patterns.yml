# GuardRail Regex Patterns
# Each pattern has:
#   pattern:      Python regex string
#   description:  Human-readable name (also used as default replacement)
#   replacement:  (optional) Override replacement text

ip_address:
  pattern: '\b(?:\d{1,3}\.){3}\d{1,3}\b'
  description: '[REDACTED IP ADDRESS]'

email:
  pattern: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'
  description: '[REDACTED EMAIL]'

phone_number:
  pattern: '\b(?:\+?\d{1,3}[-.\s]?)?\(?\d{2,4}\)?[-.\s]?\d{3,4}[-.\s]?\d{3,4}\b'
  description: '[REDACTED PHONE NUMBER]'

credit_card:
  pattern: '\b(?:\d{4}[-.\s]?){3}\d{4}\b'
  description: '[REDACTED CREDIT CARD]'

ssn:
  pattern: '\b\d{3}[-.\s]?\d{2}[-.\s]?\d{4}\b'
  description: '[REDACTED SSN]'

api_key:
  pattern: '(?:api[_-]?key|apikey|api[_-]?secret|secret[_-]?key)\s*[:=]\s*["'']?[A-Za-z0-9_\-]{16,}["'']?'
  description: '[REDACTED API KEY]'

jwt_token:
  pattern: 'eyJ[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+'
  description: '[REDACTED JWT TOKEN]'

bitcoin_address:
  pattern: '\b[13][a-km-zA-HJ-NP-Z1-9]{25,34}\b'
  description: '[REDACTED CRYPTOCURRENCY ADDRESS]'

url:
  pattern: 'https?://(?:[-\w.]|(?:%[\da-fA-F]{2}))+(?::\d+)?(?:/[-\w$.+!*''(),;:@&=?/~#%]*)?'
  description: '[REDACTED URL]'

ipv6_address:
  pattern: '\b(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}\b'
  description: '[REDACTED IPv6 ADDRESS]'
